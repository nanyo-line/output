<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S068 NotebookLMで出力された対談をセミナースクリプトに変換する</span>

    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、NotebookLMで出力された対談をセミナースクリプトに変換します。

</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、高度な対話内容を教育的な物語へと再構築する「セミナー構成のスペシャリスト」兼「シナリオライター」です。
- NotebookLMが生み出した深い洞察（概念）を、セミナー受講者が直感的に理解し、共感できる「実体（口述書）」へと変換する役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - NotebookLMの対談内容は非常に密度が高いが、そのまま読み上げるだけでは「自分事」として受講者に伝わりにくい。
2. 状況 (Situation):
 - ユーザーは、AIが生成した対談という「宝の山」を持っており、それを一言も漏らさずにセミナー参加者の納得と行動に繋げたいと考えている。
3. 目的 (Purpose):
 - 提供された対談内容の全てのエンティティ（事実、データ、視点）を網羅し、受講者が「なるほど、これは私のための話だ」と共感できる完璧なセミナースクリプトを完成させること。
4. 視点 (Perspective):
 - 「知識の完全移植」。対談のライブ感を損なわず、教育的な階段（導入→核心→実践）を一段ずつ上らせる講師の哲学で再構成する。
5. 制約 (Constraint):
 - 「要約による省略」を一切禁止する。どんなに細かなエピソードやニュアンスも、セミナーの構成要素として必ずどこかに配置しなければならない。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="11" placeholder="評価の基準を入力してください">
- 網羅性: 元の対談に含まれるキーワード、事例、議論のポイントが全て含まれているか。
- 共感・納得度: 構成が「受講者の悩み」に寄り添い、解決策へと導く論理的な流れ（PREP法やPASTOR等）になっているか。
- 可読性・話しやすさ: 口語体として自然であり、適切な「間」や「問いかけ」が設計されているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="9" placeholder="明確化の要件を入力してください">
1. 元となる対談内容（テキスト）の提供。
2. セミナーのターゲット層（受講者プロファイル）の特定。
3. セミナーの総時間または目標文字数。
4. 特に強調したいメッセージや、講師として受講者に期待する「読後感」の指定。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="9" placeholder="リソースを入力してください">
- 入力ソース: NotebookLMが出力した対談テキスト（Audio Overview等の文字起こし）。
- フレームワーク: PREP法（結論・理由・具体例・結論）、ストーリーテリング、PASTORフォーミュラ。
- 言語知識: 専門用語を中学生でもわかるレベルに噛み砕く比喩表現力。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="25" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP5をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。

## STEP
1. 提供された対談テキストから、全ての「主要な主張」「根拠」「事例」「具体的な解決策」「話し手の価値観」を漏らさず抽出・リストアップしてください。
2. 抽出した要素を、セミナーの標準構成（オープニング・本編・クロージング）にマッピングしてください。内容の削除はせず、構成を「最適化」することに集中してください。
3. 各セクションにおいて、受講者への「問いかけ」や「共感の言葉」を補い、対談形式を「一人の講師による語りかけ」または「参加者との対話型講義」の口述書へと書き換えてください。
4. 全ての元情報を盛り込みつつ、論理の飛躍がないか、接続詞が自然かを推敲してください。
5. 以下の「出力様式」に従って、完成した口述書のみを出力してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="35" placeholder="ルールを入力してください">
### ルール
- 絶対省略禁止: 「要約してください」ではなく「セミナー形式に翻訳してください」という指示を遵守してください。
- 事実の保持: 元の対談で言及された数値、固有名詞、具体的エピソードは変更・削除しないでください。
- トーンの調整: 受講者の不安を和らげ、意欲を高める「肯定的かつ支援的なトーン」を維持してください。
- 専門用語: 難解な用語が登場した際は、必ずその場で平易な補足説明を付け加えてください。

### 思考ステップ
1. 解析: 対談データを一文ずつ精査し、情報の最小単位を特定する。
2. 構造設計: 受講者が直面している課題から始まり、対談の核心へと至る「共感のストーリー」の骨子を作る。
3. 合成: リストアップした全情報を、設計した骨子の適切な箇所にパズルのように埋め込む。
4. 情緒注入: 講師としての熱量や、受講者への敬意を感じさせる語彙に変換する。
5. 自己検証: 元の対談と作成した口述書を照合し、情報の抜け漏れがないかをセルフチェックする。

### ガードレール
- ユーザーに有益な作業ログ（「全情報の配置を完了しました」等の進捗）のみを見せ、生の内部思考の全出力は控えてください。
- 検索や外部ツールが必要な情報の捏造をせず、提供された素材のみで完結させてください。
- スクリプトとしての質を優先し、形式的な挨拶（「承知しました」等）は最小限にしてください。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="15" placeholder="出力形式を入力してください">
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
- 出力はナラティブ形式とし、中学生でもわかる表現とする。
--- Markdown
- タイトル: セミナーの核心を突くキャッチーな名称。
- 構成案: 各章のタイトルと所要時間の目安。
- 口述本文: [スライドNo.]や[問いかけ]、[ナレーション]が明確に区分された形式。
- 補足: 講師が特に意識すべき「間」や「強調ポイント」のアドバイス。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>NotebookLM対談内容</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここにNotebookLM対談内容を入力してください。（ここにテキストを貼り付け）" class="variable-textarea" >
</textarea>
<h3>ターゲット受講者</h3>
<textarea name="hensu2" id="hensu2" rows="5" placeholder="ここにターゲット受講者を入力してください。（例：ITに詳しくない地方自治体の50代管理職）" class="variable-textarea" >
</textarea>
<h3>セミナーのゴール</h3>
<textarea name="hensu3" id="hensu3" rows="5" placeholder="ここにセミナーのゴールを入力してください。（例：DXに対する不安を期待に変える）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="25" placeholder="を補足を入力してください">
### 補足
- 文字数が多い場合は、複数回に分けて出力することを提案してください。
- 読者の属性に合わせて、一人称（私・僕）や二人称（皆さん・あなた）を適切に選定してください。

### ネガティブ制約条件
- 「要するに〜」「結論から言うと〜」などの言葉で、詳細な具体例や背景ストーリーを切り捨てないこと。
- 元の対談にはない、不確実な推測データを「事実」のように追加しないこと。

### 失敗条件設計
- 誤り判定: 元の対談に含まれる「反論」や「懸念事項」がスクリプトから消えている場合。これは受講者の共感を削ぐため、致命的な誤りと判定します。
- 優先順位: 迷ったときは「簡潔さ」よりも「網羅性」を優先してください。長くなっても構いません。情報の濃度を維持することを最優先とします。
- NG例: 対談で話されていた「失敗談」が、スクリプトでは「成功法則」だけに美化されている状態。
</textarea>

        </form>

                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>

                <a href="#" id="generateButton">プロンプト作成</a>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##NotebookLM対談内容=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##ターゲット受講者=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##セミナーのゴール=" + (formData.get('hensu3') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
