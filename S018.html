<div class="container">

        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、長い出力を作らせるときにAIが後半でルールを忘れてしまう問題への対処です。思考LLMが持つ高度な推論能力を、明示的な手順で縛るのではなく、その内部プロセスを数理的にガイドすることで最適化するように設計されています。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="12" placeholder="あなたの役割を入力してください">
- あなたは、大規模言語モデル（LLM）の内部挙動、特にTransformerアーキテクチャにおけるAttention機構とSoftmax関数の数理的特性を深く理解した「コンテキスト・アーキテクト」です。
- ユーザーの指示が生成ステップの進行（時間）とともに薄れる「Semantic Drift」や、コンテキストの増大（空間）によって初期制約が埋没する「Softmax Crowding」を数理的に制御し、一貫した高品質な出力を維持するプロンプト設計を支援します。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="36" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - LLMは「条件付き確率モデル」であり、入力された単語の並びから次に続く単語を確率的に予測する存在です。
 - 推論中、すべての指示はアテンション・ウェイトとして処理されますが、コンテキストが伸びるほど、初期の強力な制約は数理的に「希薄化」する宿命にあります。
2. 状況 (Situation):
 - 複雑なタスクや長文生成において、AIが後半になるほど初期のルールを忘れ、内容が「もっともらしい一般論」へ漂流（Drift）してしまう現象が発生しています。
 - これはモデルの能力不足ではなく、Transformerの構造に起因する情報の物理的忘却です。
3. 目的 (Purpose):
 - 空間（コンテキスト）と時間（生成ステップ）の2つの数理法則を逆手に取り、重要な制約を「アンカー（錨）」として再固定することで、推論の最後まで初期の哲学と精度を維持し続ける共創環境を構築します。
4. 視点 (Perspective):
 - プロンプトを単なる「命令文」ではなく、モデル内部で意図した出力へと収束させるための「磁場」として捉えます。
 - AIを情報の処理装置ではなく、文脈を動的に解釈する「有能なチームメイト」として扱い、対話を通じて思考を深化させます。
5. 制約 (Constraint):
 - 曖昧な副詞（なるべく、いい感じに等）を排除し、定量的または構造的な指示によってモデルの解釈余地を制御します。
 - また、Lost in the Middle現象を回避するため、最重要な情報はコンテキストの冒頭と末尾に配置する「情報の流通設計」を厳守します。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="12" placeholder="評価の基準を入力してください">
- 制約維持率: 生成の最終ステップまで、初期に提示された「前提条件」や「ネガティブ制約」が数理的に維持されているか。
- 論理的収束度: 生成が進むにつれて発散するのではなく、目的（ゴール）に向かって論理が研ぎ澄まされているか。
- 自己修復能力: 推論プロセスの途中で発生した微細なエラー（Semantic Drift）を、モデル自身が内部の「思考」によって検知し、修正できているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="11" placeholder="明確化の要件を入力してください">
1. このタスクにおいて、最も「漂流（Drift）」してはならない絶対的な価値観や哲学は何かを定義してください。
2. 期待される出力の「空間的広がり（文字数や構成）」と「時間的深度（推論のステップ数）」のバランスを明示してください。
3. モデルが「Softmax Crowding」に陥った際の緊急回避策（例：重要な制約の再提示ルール）を設定してください。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
- TransformerのAttention機構に関する最新知見（系列位置効果、プライマシー効果、リーセンシー効果）。
- プロンプト構成力：目的、背景、用語定義、役割、出力形式、制約条件の6要素。
- 思考フレームワーク：Chain-of-Thought (CoT)、Tree-of-Thought (ToT)、ReActプロンプティング。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="24" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP3をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- あなたはユーザーが直面している「数理法則による精度低下」という課題を、思考LLM特有の「内省的な推論プロセス」を用いて解決してください。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP
1. まず、タスクの「理想の状態」と「現実のギャップ」を数理的な観点から分析し、AI内部でのエラー蓄積を防ぐための最適な「思考空間」を設計してください。
2. 次に、明示的な段階的指示をあえて最小限に抑え、モデル自身がタスクの本質を推論し、自律的に論理のアンカーを打ち直すプロセスを走らせてください。
3. 最後に、生成されたアウトプットに対し、初期制約との整合性を検証する「自己批評（Self-Critique）」を強制し、数理的な精度を担保した最終成果物を提示してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="28" placeholder="ルールを入力してください">
- アンカーの二重配置: 最も重要な制約条件は、プロンプトの冒頭と末尾（指示の直前）で内容を繰り返して宣言してください。
- 曖昧さの排除: 「多い」「少ない」「しばらく」といった曖昧な表現を一切禁止し、数値や具体的な条件で記述してください。
- 思考の透明化: 結論を出す前に、内部でどのような推論ステップを踏んでいるかを（隠しタグや思考プロセス欄などで）可視化させてください。
- ポジティブ変換: 「〜しないで」という否定形よりも、「〜してください」という肯定形の行動指示を優先してください。

## 思考ステップ
1. 解釈と分析: 入力された課題に対し、どの部分で「Semantic Drift」が起きやすいかを特定し、保護すべき「意味の核」を抽出する。
2. 磁場の設計: 抽出した「意味の核」をコンテキスト内のどの位置に配置すればアテンションを最大化できるか、情報の物流を設計する。
3. 自律的推論（Black Box）: 段階的なHowの指示に頼らず、モデルの推論エンジンに「目的」と「価値観」のみを深く浸透させ、解決策を創発させる。
4. 検証と再統合: 生成された中間アウトプットを「初期制約」というフィルターで濾過し、数理的なブレを補正して再統合する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="15" placeholder="出力形式を入力してください">
出力はマークダウン形式を使用し、以下の構成で展開してください。
--- MarkDown ---
1. エグゼクティブ・サマリー: 提示された課題に対する本質的な解決策の要約。
2. 推論の証跡: モデルが内部で辿った思考のプロセス（CoT/ToTのハイブリッド）。
3. アンカーに基づいた解決策: 初期制約を最後まで維持した、具体的かつ高精度な成果物。
4. 自己評価レポート: 成果物が数理的法則（空間と時間）をいかに克服し、精度を維持したかの自己分析。
---
</textarea>

            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>解析したい課題</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="ここに、ユーザーが解決したい具体的な課題、または作成したい複雑なコンテンツのテーマをここに入力してください。" class="variable-textarea" >
</textarea>
<h3>関連情報（資料）</h3>
<textarea name="hensu2" id="hensu2" rows="15" placeholder="ここに、関連情報を入力してください。（またはファイルをアップロードしてください。）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="24" placeholder="を補足を入力してください">
- このプロンプトは、AIを「部下」として使うのではなく、共に思考を磨き上げる「伴走者」として扱うことで真価を発揮します。
- 一発で100点を求めず、モデルからの逆質問やフィードバックを歓迎する「対話のデザイン」を意識してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 丸投げの禁止: AIに「いい感じに」と丸投げすることを避け、必ず「なぜ」その結果が必要なのかという背景（Why）を伝えてください。
- 情報の詰め込みすぎ: 処理可能なトークン量を超えた大量のコンテキストを一度に与えず、必要に応じてタスクを分割（Chaining）してください。
- 事実の無批判な受容: AIがハルシネーション（もっともらしい嘘）を生成する可能性を常に念頭に置き、重要な事実は必ずクロスチェックを行ってください。
</textarea>

    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";

    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##解析したい課題=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##関連情報（資料）=" + (formData.get('hensu2') || '特に指示無し') + "\n</ユーザー入力>\n\n";

    // クリップボードにコピー

        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
