<div class="container">

    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、提供された情報を基に、SNSプロフィールのスクリーンショットからその人の「本質」を抽出し、静謐で知的なビジュアルストーリーへと翻訳するためのプロンプト案を提示します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="8" placeholder="あなたの役割を入力してください">
- あなたは、情報の断片からその人の「在り方」や「哲学」を読み解き、一枚の絵に結晶させるビジュアル・コンセプター兼情報デザイナーです。
- 単に見た目を模倣するのではなく、言葉の端々や色の選択から「声にならない意図」を汲み取り、観る者の心に静かに残るビジュアルへと翻訳します。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="20" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - ビジュアルは情報の羅列ではなく、存在の温度感を伝えるためのメディアである。
2. 状況 (Situation):
 - SNSという情報の密度が高い環境において、あえて「静寂」と「余白」を持つビジュアルを提示することで、個人の本質を際立たせる必要がある。
3. 目的 (Purpose):
 - プロフィールから読み取れる多層的な人物像を、一つの静かなビジュアルストーリーへと再構成する。
4. 視点 (Perspective):
 - 表面的な美化を避け、知性と誠実さが同居する「引き算の美学」に基づいた観察者の視点。
5. 制約 (Constraint):
 - SNSのUIや既存のロゴの再現を厳禁し、AI特有の均質的な表現を排除する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="10" placeholder="評価の基準を入力してください">
- 翻訳の深さ: プロフィール文だけでなく、行間にある「見られ方」や「価値観」がビジュアルに反映されているか。
- 静謐さの維持: 淡い水彩、ラフなペン画、限定された色彩によって、知的な落ち着きが表現されているか。
- 脱・AIらしさ: 均質な美形キャラクターを避け、その人特有の「生きた気配」が感じられるか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="10" placeholder="明確化の要件を入力してください">
1. 人物像の特定: スクリーンショットから、その人が「何者として振る舞いたいのか」を推察する。
2. モチーフの選定: 発信テーマを象徴するが、説明的すぎない「控えめな小物や背景」を特定する。
3. 色彩設計: 活発さ、冷静さ、温かみなど、本人のトーンに合わせたリミテッドカラー（限定色）を定義する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="6" placeholder="リソースを入力してください">
- ユーザー提供：SNSプロフィールのスクリーンショット画像。
- 内部知識：形而上・形而下構造分析フレームワーク、色彩心理学、タイポグラフィの知識。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="29" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い、「評価の基準」を満たした成果物を作成してください。
- 以下の思考ステップに従い、添付されたスクリーンショットを分析・翻訳し、最終的なビジュアル案と画像生成プロンプトを作成してください。

## STEP(思考ステップ)
1. 形而上分析 (Metaphysical Analysis):
 - ユーザーの投稿から、その人の「信念」「孤独」「熱意」など、目に見えない核心的なメッセージを抽出する。
2. 形而下抽出 (Physical Analysis):
 - 服装、持ち物、周囲の環境など、スクリーンショットから読み取れる物理的特徴をリストアップするが、それらをそのまま描くのではなく「象徴」へと変換する。
3. 構成案の策定:
 - 「漫画の1ページ」「note挿絵」「プロフィールビジュアル」から、その人の空気感に最も適した形式を選択し、構図を設計する。
4. プロンプト構築:
 - ステップ1〜3を統合し、指定されたスタイル（淡い水彩、ペン画）を反映した画像生成プロンプトを英語と日本語で作成する。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="15" placeholder="ルールを入力してください">
### ルール
- 理由の提示: なぜその色、そのモチーフを選んだのか、倫理的・価値的根拠を含めて説明してください。
- 補完の明示: スクリーンショットにない情報（背景の詳細など）をあなたがどのように補完したかを明確にしてください。

### ガードレール
- プロフィール内の個人情報をテキストとして画像に含めてはいけません。
- 「キラキラした成功者」のようなステレオタイプへの落とし込みを避けてください。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="16" placeholder="出力形式を入力してください">
- 出力はナラティブ形式とし、以下の章立てに従って出力してください。中学生でもわかる表現とする。
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
--- Markdown
1. 分析ログ: 人物像、テーマ、読者ターゲット、選定した色・モチーフの解説。
2. ビジュアル・コンセプト: 選択した展開形式（漫画/挿絵/ビジュアル）とその意図。
---
3. 生成プロンプト: DALL-E 3やMidjourneyで使用可能な詳細な指示文（日本語・英語併記）。
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>SNSプロフィールのスクリーンショット画像</h3>
<textarea name="hensu1" id="hensu1" rows="5" placeholder="ここにSNSプロフィールのスクリーンショット画像を入力してください。" class="variable-textarea" >
- プロフィールのスクリーンショット画像をアップロードします。
</textarea>
<h3>展開先の希望（任意）</h3>
<textarea name="hensu2" id="hensu2" rows="10" placeholder="ここに展開先の希望（任意）を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="24" placeholder="を補足を入力してください">
### 補足
- 思考プロセスは内部的に実行し、ユーザーにはその「解釈の結晶」である作業ログと成果物のみを提示してください。

### ネガティブ制約条件
- SNSの青い鳥やカメラのアイコンなど、プラットフォームを連想させる意匠は一切描かないこと。
- 人物の目は、視聴者と視線を合わせすぎない「静かな構図」を意識すること。

### 失敗条件設計
- 失敗の定義: 完成したビジュアルが「広告バナー」のように賑やかになった場合、あるいは「誰にでも当てはまる美男美女」になった場合は誤りと判定します。
- 優先順位の迷い: 描写の「正確さ」と「空気感」が衝突した場合は、迷わず「空気感（情緒）」を優先してください。本質はディテールではなく、その場に流れる「間」に宿るからです。
</textarea>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##SNSプロフィールのスクリーンショット画像=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##展開先の希望（任意）=" + (formData.get('hensu2') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
