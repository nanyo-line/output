<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex" />
    <title>#S021 Prompt to Skills コンバーター</title>
    <style>
        /* === スタイル設定 === */
        
        /* 基本ページ設定 */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #FFF;
        }
        /* メインコンテナのスタイル */
        .container {
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 3px 5px 15px -5px #777777;
            overflow: hidden;
        }
        /* 各種見出し・ボタンのスタイル設定 */
        h2 {
            color: #797979;
            font-size: 1.6em;
        }
        .box-title {
            font-size: 1.7em;
            letter-spacing: 0.1em;
            padding: 1em 20px; /* Combined padding */
            background-color: #5fc2f5;
            color: #fff;
            font-weight: 600;
            display: flex; /* Make it a flex container */
            align-items: center; /* Vertically center items */
            justify-content: space-between; /* Push items to ends */
        }
        .box-title .title-text {
            flex-grow: 1; /* Allow title to take available space */
            text-align: center; /* Keep title centered */
            white-space: nowrap; /* Prevent wrapping */
            overflow: hidden; /* Hide overflow content */
            text-overflow: ellipsis; /* Show ellipsis for truncated text */
        }
        #toggleIcon {
            font-size: 24px; /* Increased size */
        }
        .form-content {
            padding: 40px 120px;
            background: #f1f1f1;
        }
        .box-bun {
            background: #FFF;
            border: 1px solid #D5D9DC;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 40px;
        }
        .togglable-section {
                /* display: none; Removed */
            }
        label {
            display: inline-block;
            margin-left: 5px;
            color: #656565;
        }
        input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            border: 0.5px solid #AEAEAE;
            border-radius: 5px;
            font-size: 16px;
        }
        textarea {
            resize: vertical;
        }
        .button-group {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .btn2 {
            width: 150px;
            height: 60px;
            margin: 0 10px;
        }

        .btn-generate {
            width: 180px;
            height: 60px;
            margin: 0 10px;
        }
        .btn2 a, .btn-generate a {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 35px;
            transition: all 0.5s ease;
        }
        .btn2 a {
            background: #FFFFFF;
            color: #5FC2F5;
            border: 2px solid #5FC2F5;
        }
        .btn2 a:hover {
            transform: scale(1.1, 1.1);
        }
        .btn-generate a {
            background: #5FC2F5;
            color: #FFFFFF;
        }
        .btn-generate a:hover {
            transform: scale(1.1, 1.1);
        }
        .small-text {
            font-size: 0.5em;
            color: #656565;
            text-align: center;
            margin-top: 5px;
        }

/* === 入力エリアの色設定 === */
.variable-textarea {
    background-color: #ffe4e1; /* 薄いピンク */
}


        /* === スマホ用設定 === */
@media only screen and (max-width: 768px) {
    .prompt-text {
        display: none;
    }
    .container {
        width: 100%;
        padding: 10px;
        box-shadow: none;
    }
    .form-content {
        padding: 20px 10px;
    }
    .box-bun {
        padding: 10px;
        margin-bottom: 20px;
    }
    h2 {
        font-size: 1.4em;
    }
    .button-group {
        flex-direction: column;
    }
    .btn2, .btn-generate {
        width: 100%;
        height: 50px;
        margin: 10px 0;
    }
    .btn2 a, .btn-generate a {
        font-size: 18px;
    }
    textarea {
        font-size: 14px;
    }

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S021 Prompt to Skills コンバーター</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、ユーザーが提供したプロンプトをAIエージェントの「Skills（スキル）」セクションへと変換するための生成AI用プロンプト案を提示します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="10" placeholder="あなたの役割を入力してください">
- あなたは、プロンプトエンジニアリングの高度な知見を持つ「エージェント・アーキテクト」です。
- あなたの任務は、ユーザーから提供された静的な「指示文（プロンプト）」を深く解析し、自律型AIエージェントが自身の能力として定義・実行するための「Skills（スキルセット）」セクションへと動的に変換することです。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="26" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - プロンプトは単なる命令の集合ではなく、AIの「思考プロセス」を規定するプログラムである。
 - これを「Skills」に変換することで、エージェントの動作はより安定し、高度な推論が可能になる。
2. 状況 (Situation):
 - ユーザーは既存の構造化プロンプト（役割、前提、ルール等に分かれたもの）を、最新のAIエージェント仕様（Skillsベースの構成）に最適化したいと考えている。
3. 目的 (Purpose):
 - 入力されたプロンプトの各カテゴリに含まれる「実行能力」を抽出し、エージェントが「何ができるのか（Skills）」という形で再定義・統合すること。
4. 視点 (Perspective):
 - 命令を「外部からの強制」としてではなく、AI自身が内面化した「専門的な技量・知識」として記述し、共創の質を高める哲学を持つ。
5. 制約 (Constraint):
 - 入力されたプロンプトの内容を自分自身で実行してはならない。
 - あくまで「Skillsへの変換」というメタ・タスクに徹し、出力はすべて散文形式（表形式禁止）で行うこと。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="11" placeholder="評価の基準を入力してください">
- 元のプロンプトの「実行指示」や「思考ステップ」が、欠落することなく「Skills」として昇華されているか。
- 「前提条件」や「リソース」に含まれる知識ベースが、スキルの背景にある「専門知」として適切に組み込まれているか。
- 思考LLMの特性を活かし、単なる手順の羅列ではなく、推論を伴う高度な能力定義になっているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="13" placeholder="明確化の要件を入力してください">
1. 提供されたプロンプトが既に構造化（役割、ルール、手順等）されている場合、それらの関係性を維持したままSkillsへマッピングすること。
2. 「あなたの役割」を「エージェントのアイデンティティ（Identity）」、「実行指示」を「コア・スキル（Core Skills）」、「思考ステップ」を「推論フレームワーク（Reasoning）」として再構築すること。
3. 不足しているコンテキストや、Skillsを定義する上で曖昧な点がある場合は、変換前に一度だけ確認の質問を投げかけること。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="10" placeholder="リソースを入力してください">
- 7Rプロンプト・フレームワーク: Request, Role, Regulation, Rule, Review, Reference, Run Scenario。
- CRAFTの法則: Context, Role, Action, Format, Tweakによる構造化技術。
- Chain of Thought (CoT): 段階的な推論プロセスの定義手法。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="17" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP2をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。

## STEP
1. ユーザーから提供されるプロンプトを読み込み、以下の「思考ステップ」を経て、エージェントの「Skills」セクションを構築してください。
2. この際、入力プロンプトを実行するのではなく、そのプロンプトが「どのような能力をAIに求めているか」を抽出し、洗練された言語で定義し直すことに集中してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="28" placeholder="ルールを入力してください">
- 出力は必ず散文形式で行い、表形式（Markdownテーブル等）は一切使用しないこと。
- 否定的な制約条件（「〜してはならない」等）は、スキルの「境界線（Guardrails）」として定義すること。
- 思考LLM（o3、o1、Thinkingモデル等）を使用する場合、詳細すぎるステップ指示は避け、AIに「このプロンプトの本質的な能力をどう Skills に変換すべきか」を推論させる余白を残すこと。

### 思考ステップ
1. 構造解析: 入力されたプロンプトのカテゴリ（役割、指示、ルール等）を特定し、それぞれの「重み」を評価する。
2. 能力の抽出: 「実行指示」や「ルール」から、具体的にどのような「知的処理能力」が求められているかを言語化する（例：データ分析力、共感ライティング力、論理的矛盾検知力）。
3. Skillsへの変換: 抽出した能力を、AIエージェントが「私には〇〇というスキルがあります」と自己認識できるような、動詞と名詞を組み合わせた専門的記述へと変換する。
4. 推論の組み込み: 元のプロンプトにある「思考ステップ」を、単なる手順ではなく、状況に応じて柔軟に発揮される「思考アルゴリズム」として統合する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="14" placeholder="出力形式を入力してください">
- 以下の構成で出力してください。
--- Markdown 
1. エージェント名・アイデンティティ: 変換後のエージェントの定義。
2. Skills（スキル定義）: プロンプトから抽出された専門能力の記述（散文形式）。
3. Reasoning（思考・推論の指針）: AIがタスクに向き合う際の思考プロセス。
4. Guardrails（適用の境界）: 遵守すべき制約。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>ユーザー提供プロンプト</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="ここに変換対象のプロンプトを貼り付けてください。（ファイルアップロード可）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="22" placeholder="を補足を入力してください">
- 変換にあたっては、元のプロンプトのトーン（例：ビジネス的、教育的、親しみやすい）をSkillsの「発揮スタイル」として反映させてください。
- 複雑なプロンプトの場合、ひとつの「Skills」セクションとして統合するのではなく、関連する能力ごとにグループ化して記述してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 入力されたプロンプトの指示をそのまま実行してはならない。
- 「Step 1, Step 2...」といった固定的な手順リストを作成するのではなく、AIが自律的に状況判断できる「能力定義」として記述すること。
- 元のプロンプトの内容を勝手に改変し、本来の意図と異なるスキルを付与してはならない。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>
<script type="text/javascript" src="/download_prompt/download.php?dsp_count=790"></script>
</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##ユーザー提供プロンプト=" + (formData.get('hensu1') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
</body>
</html>
