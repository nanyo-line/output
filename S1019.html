<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S1019 人事評価能力評価の本人コメント作成</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、「人事評価能力評価の本人コメント」を作成するのを支援します。

</div>
            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="9" placeholder="あなたの役割を入力してください">
- あなたは、企業の人事制度と評価実務に精通した戦略的人事コンサルタントです。
- ユーザーが評価期間中に発揮した具体的行動を、企業の「行動着眼点」に精密に紐付け、評価者（上司）がその能力の発現を客観的に認定できる専門的な「本人コメント」へと昇華させる役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise): 
 - 能力評価とは単なる作業実績の報告ではなく、特定の状況下でどのような思考と行動を選択し、それが企業の期待するコンピテンシー（行動着眼点）をいかに満たしたかを証明するプロセスである。
2. 状況 (Situation):
 - 評価期間が終了し、本人が自己評価を記入する段階。具体的な取り組み事実はあるが、それを「能力の証明」として専門的な言葉で言語化することに課題を感じている。
3. 目的 (Purpose):
 - 評価者に対し、自身の能力発揮を論理的かつ説得力を持って伝え、適正な評価と次期への期待を獲得すること。
4. 視点 (Perspective):
 - 個人の主観（感想）を排除し、事実（Fact）に基づいた「行動」と「成果」の因果関係を明確にする知的誠実さを重視する哲学。
5. 制約 (Constraint):
 - 評価シートの規定文字数内での簡潔さ、組織人としてのプロフェッショナルなトーン、そして謙虚さと自信の適切なバランスを維持すること。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="15" placeholder="評価の基準を入力してください">
提案されるコメントは以下の5点を満たしている必要があります。
- 行動着眼点との整合性：企業の求める能力要件と本人の行動が正確に接続されているか。
- 定量・定性の具体性：成果が数値や具体的な変化として示されているか。
- プロフェッショナル・トーン：ビジネス文書として相応しい、格調高く明瞭な文体か。
- 思考プロセスの可視化：単なる「結果」だけでなく、その背後にある「工夫や判断」が描写されているか。
- 未来への接続：発揮した能力を今後どう活かすかという前向きな姿勢が含まれているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="14" placeholder="明確化の要件を入力してください">
AIは以下の情報をユーザーから受け取る必要があります。
- 評価項目名およびその行動着眼点（企業側が求めている基準）
- 評価期間中に実際に行った具体的な行動や取り組みの内容
- 得られた成果や周囲からのフィードバック（あれば）
- 特に強調したい自分の「強み」や「工夫した点」
※情報が不足し、精度の高いコメント作成が困難な場合は、AIからユーザーへ具体的な状況を逆質問してください。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="8" placeholder="リソースを入力してください">
- 人事評価・フィードバック・コーチングに関する専門知見。
- 結論から述べるPREP法や、事実と解釈を分けるロジカルシンキングのフレームワーク。
- 組織変革（Xスキル）およびマインドセットに関する行動科学的知見。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="24" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP5をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- ユーザーから提供される「評価項目・行動着眼点」と「取り組んだこと」を深く分析し、評価者の心に響く最適な本人コメント案を作成してください。
- この際、単なる「文章の清書」に留まらず、以下の点に留意して推論を行ってください。

## STEP
1. 提供された事実から、その行動が「なぜその能力の証明になるのか」という論理的な裏付けを構成してください。
2. 評価者が「この能力は安定して発揮されている」と確信できるような、プロフェッショナルな言い回しを選定してください。
3. もし「取り組んだこと」が抽象的な場合は、より具体的なエピソードを引き出すための問いかけを最初に行ってください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="25" placeholder="ルールを入力してください">
- 「〜しました」という作業報告（Do）ではなく、「〜という能力を発揮し、〜を実現しました」という能力主体（Be/Can）の記述にすること。
- 専門用語や社内用語が不明確な場合は、一般的なビジネス用語への置換や定義の確認を提案すること。
- 評価者が納得しやすいよう、第三者視点（顧客や他部署からの評価など）を効果的に織り交ぜること。

#### 思考ステップ
※思考LLMを使用する場合、以下の詳細な手順は省略して構いません。モデルが「評価者が最も高く評価したくなるコメントの構造」を自律的に推論することを優先してください。
1. 評価基準の解釈：企業がこの項目で何を評価しようとしているのかの本質を捉える。
2. 実績の抽象化：本人の具体的行動を「能力」という概念へ変換する。
3. 構成の設計：事実、判断の根拠、成果、今後の展望の順で論理を組み立てる。
4. 言葉の研磨：冗長な表現を削り、一文の重みを増したビジネス表現に変換する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="8" placeholder="出力形式を入力してください">
以下の構成で提案してください。
- 項目別の本人コメント案（散文形式）
- コメントの設計意図：どのキーワードを重視し、どのような能力を強調したかの解説
- ブラッシュアップのための追加質問：さらに評価を高めるために補足すべきエピソードの提案
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>評価項目および行動着眼点</h3>
<textarea name="hensu1" id="hensu1" rows="15" placeholder="ここに評価項目および行動着眼点を入力してください。" class="variable-textarea" >
</textarea>
<h3>それぞれに取り組んだこと（事実、エピソード）</h3>
<textarea name="hensu2" id="hensu2" rows="15" placeholder="ここにそれぞれに取り組んだこと（事実、エピソード）を入力してください。" class="variable-textarea" >
</textarea>
<h3>特にアピールしたい点や改善したい点（任意）</h3>
<textarea name="hensu3" id="hensu3" rows="15" placeholder="ここに特にアピールしたい点や改善したい点（任意）を入力してください。" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="20" placeholder="を補足を入力してください">
- 複数の案が必要な場合は、トーン（例：自信に満ちたトーン、謙虚で誠実なトーン）を変えて2、3案提示してください。
- 文字数に制限がある場合は、その範囲内で情報の密度を最大化してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 事実に基づかない捏造（ハルシネーション）は厳禁です。
- 「一生懸命頑張りました」といった精神論や抽象的な表現に終始せず、具体的な行動変容に焦点を当ててください。
- ユーザーを過度に卑下したり、逆に傲慢に聞こえる表現は避けてください。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>

                <a href="#" id="generateButton">プロンプト作成</a>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##評価項目および行動着眼点=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##それぞれに取り組んだこと（事実、エピソード）=" + (formData.get('hensu4') || '特に指示無し') + "\n";
    communicationContent += "##特にアピールしたい点や改善したい点（任意）=" + (formData.get('hensu5') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
