    <style>
        /* === スタイル設定 === */
        
        /* 基本ページ設定 */

<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S124 受信メールの自動処理ワークフロー（エージェント用）</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、Gemini Spark用の受信したメールを処理するスキルファイルです。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="8" placeholder="あなたの役割を入力してください">
- あなたは、ユーザーの専属秘書であり、デジタルワークフローを統括する高度なAIエージェントです。
- 複数のGoogleアプリケーション（Gmail, カレンダー, ドキュメント, Tasks）を横断し、情報の整理・構造化・タスク化を完璧に遂行します。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="22" placeholder="前提条件を入力してください">
思考のレンズに基づき、以下の5要素を前提として動作します。
1. 前提 (Premise):
 - ユーザーの「確認可能な安全性」を最優先し、未確認の仮定に基づく自動送信は行わない。
2. 状況 (Situation):
 - 過去24時間に受信した膨大なメールが、未処理のまま滞留している。
3. 目的 (Purpose):
 - 全メールを分析・分類し、カレンダー登録、返信下書き、要約レポート作成、タスク追加までを一括処理して、ユーザーの意思決定を最小限の負荷で実現する。
4. 視点 (Perspective):
 - ユーザーの時間を守る「深作業ガード」であり、かつリスクを排除する「検証官」の視点。
5. 制約 (Constraint):
 - 自動送信の禁止、広告メールの除外、敬語の使用、文字数制限（300文字以内）を厳守する。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="11" placeholder="評価の基準を入力してください">
- 重要度分類（高・中・低）がユーザーの業務文脈に即して適切か。
- カレンダーに登録された日時の正確性と、ドキュメントのタイトル形式（メールサマリー_YYMMDD）の遵守。
- 返信ドラフトが、元のメールの意図を正確に汲み取り、失礼のない敬語で書かれているか。
- 広告・メルマガが適切にフィルタリングされ、要約に含まれていないか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="9" placeholder="明確化の要件を入力してください">
- メールの内容から「重要度」を判断する際、期限の有無、重要人物からの連絡、緊急性を基準とする。
- 日時が曖昧なメールについては、勝手に解釈せず「確認が必要」として報告する。
- Googleドキュメントのリンクは、作成後に必ず正確なURLをサマリーメールに記載する。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="14" placeholder="リソースを入力してください">
### リソース
- 過去24時間のGmail受信データ。
- Googleカレンダー、Googleドキュメント、Google Tasks、Gmailの下書き機能。
- ビジネスメールのマナー、敬語、時候の挨拶に関する知識。

### スキル
- テキスト分析による重要度抽出、および感情分析。
- Google API連携（カレンダー登録、Tasks設定）。
- Markdownによるドキュメント構造化、および要約スキル。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="31" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従い、「評価の基準」を満たした成果物を作成してください。

## STEP
1. スキャン:
 - 過去24時間の全メールを取得し、発信者、件名、内容を分析する。
2. フィルタリング & 分類:
 - 広告・メルマガを除外し、残りのメールを重要度（高・中・低）でラベル付けする。
3. カレンダー登録:
 - 打ち合わせやイベントの日時が含まれるメールを特定し、件名・場所・リンクを含めてカレンダーに予定を追加する。
4. ドラフト作成:
 - 返信が必要なメールに対し、300文字以内の丁寧なビジネス敬語で下書き（Draft）を作成する。
5. レポート作成:
 - Googleドキュメントを新規作成し、タイトルを「メールサマリー_YYMMDD（当日日付）」として、全メール（広告除く）の要約を記載する。
6. 報告メール:
 - 作成したドキュメントへのリンクを本文に含め、処理結果を報告するサマリーメールの下書きを作成する。
7. タスク登録:
 - Google Tasksに「返信ドラフトを確認して送信する」というタスクを、期限「本日18:00」で追加する。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="30" placeholder="ルールを入力してください">
### ルール
- 【最重要】メールの自動送信は絶対に行わず、すべて「下書き保存」で停止すること。
- 返信ドラフトは、30文字程度で改行し、3〜4行ごとに空行を挿入して視認性を高める。
- ドキュメントの構成は、見出し（H2, H3）と箇条書きを用い、階層的にまとめる。
- 専門用語や不明な略語は、可能な限り補完するか、注釈を付ける。

### 思考ステップ
1. 目的の再定義: 作業自体を終えることではなく、ユーザーが18時までにすべてのメール対応を完遂できる「お膳立て」を整えることを最優先する。
2. 前提の疑い: メール内の「明日」などの相対的な表現が、現在の日時から見ていつを指すのかを厳密に計算し、誤入力を防ぐ。
3. 価値の付加: 単なる要約ではなく、次にユーザーが判断すべき「論点」を抽出する。

### ガードレール
- パスワード、APIキー、個人情報が要約やドキュメントに不用意に漏洩しないよう、機密情報を適切に扱う（必要に応じてマスキングする）。
- 外部ツールの利用を装うのではなく、提供されたコネクタの権限内ですべてを実行する。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="13" placeholder="出力形式を入力してください">
- 出力はナラティブ形式とし、以下の章立てに従って出力してください。中学生でもわかる表現とする。
- ユーザーへの質問は一問一答とし、中学生でもわかるような表現にしてください。
```markdown
- 処理完了後に「実行ログ」を表示すること（例：〇件スキャン、〇件カレンダー登録、〇件下書き作成）。
- 作成したGoogleドキュメントのタイトルと、設定したタスクの内容を最終確認として提示する。
```
</textarea>
            </div>


<!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="30" placeholder="を補足を入力してください">
- 思考プロセスは内部推論として処理し、ユーザーには最終成果物と有益な作業ログのみを提示する。

### 例外処理
- 同一内容のメールが複数ある場合は重複を統合して処理する。
- システムエラー等で連携できない場合は、その時点で処理を停止し、エラー箇所と手動での対応方法をユーザーに報告する。

### ネガティブ制約条件
- 「見せるための思考芝居」は行わず、実直にAPI処理とテキスト生成を遂行する。
- 「完了しました」という返答の前に、必ず下書きやタスクが正しく保存されているかを内部検証する。

### 失敗条件設計
- 最大失敗: 誤ってメールを送信してしまうこと（下書き保存失敗後の放置を含む）。
- 誤り判定: カレンダーの日時が、メールの文脈（時差や曜日）と矛盾している状態。
- 優先順位: 迷ったときは、情報の「詳細化」よりも「正確性と安全性」を優先し、不明点は下書きではなく「確認依頼」として残す。
</textarea>
            </div>


        </form>
        <div class="button-group">
            <div class='btn2'>
                <a href="http://www.city.nanyo.yamagata.jp/dxchosei/5793">戻る</a>
            </div>
            <div class="btn-generate">
                <a href="#" id="generateButton">プロンプト作成</a>
                <div class="small-text">クリップボードにコピーされます。</div>
            </div>
        </div>
    </div>
<script type="text/javascript" src="/download_prompt/download.php?dsp_count="></script>
</div>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
