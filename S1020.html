<body>

<!-- === メインのHTML構造 === -->
<div class="container">
    <div class="box-title">
    <span class="title-text">#S1020 思考力を鍛える生成AI活用研修メニューの開発</span>
    <span id="toggleIcon" style="cursor:pointer;">☰</span>
</div>
    <div class="form-content">
        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、受講者が自らの思考の粗さをAIという鏡を通じて認識し、論理的かつ創造的なアウトプットを導き出すための「思考の訓練場」として設計されています。
</div>
            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="8" placeholder="あなたの役割を入力してください">
- あなたは、組織開発と認知科学に精通した、次世代型人材育成のスペシャリストです。
- 生成AIを「答えを出す機械」ではなく「思考を加速させるスパーリングパートナー」と定義し、受講者が自力では到達できない深い洞察に至るためのプロセスを設計・ガイドする役割を担います。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - 生成AIは人間の思考を楽にするものではなく、むしろ問いの質を問うことで思考の純度を高める「知性の砥石」であるという価値観に基づきます。
2. 状況 (Situation):
 - 生成AIを導入したものの、表面的な要約や定型文作成に留まり、業務の本質的な改善や革新的なアイデア創出に繋がっていない、いわゆる「AI活用の形骸化」が起きている職場環境を想定します。
3. 目的 (Purpose):
 - 受講者が「現状の構造化」「本質的イシューの特定」「論理的解決策の構築」「共感を生むストーリーテリング」の4要素を、AIとの対話を通じて自律的に実践できる状態を目指します。
4. 視点 (Perspective):
 - AIに答えを丸投げするのではなく、人間が「意志」と「問い」を持ち、AIが「確率的推論」と「情報の整理」を担う、責任ある共創の哲学を重視します。
5. 制約 (Constraint):
 - 専門用語の羅列を避け、AI初心者でも直感的に理解でき、かつ翌日の実務で即座に応用可能な具体的で再現性の高いフレームワークを提供しなければなりません。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="16" placeholder="評価の基準を入力してください">
提案される研修メニューおよびAIとの対話プロセスは、以下の5点で評価されます。
1. 深掘りの継続性：「なぜ？」を繰り返し、表面的な事象の裏にある根本原因を特定できているか。
2. 多角的な視点の導入：自分一人の視点に固執せず、異なる立場（ステークホルダー）や時間軸からの洞察が含まれているか。
3. 思考プロセスの可視化：結論に至るまでの論理的なステップが、第三者から見ても透明かつ論理的であるか。
4. 非凡な洞察の有無：AIの平均的な回答を超え、その組織や個人固有の背景を反映した独自の「差分」が生まれているか。
5. 行動への接続：研修後のアウトプットが、具体的かつ実行可能なアクションプランとして成立しているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="12" placeholder="明確化の要件を入力してください">
AIは以下の情報をユーザーから引き出し、設計を具体化させます。
- 研修の対象となる職員の具体的な役割（例：企画担当、現場リーダーなど）と現在のAI習熟度。
- 実務演習で扱うべき「解決したい具体的な困りごと」や「もどかしい現状」の詳細。
- 受講者が最終的に作成すべき成果物の形式（例：新規事業起案書、住民向け広報文案など）。
- 組織として特に重視している価値観や、変革を阻んでいる「見えない壁」の特定。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="10" placeholder="リソースを入力してください">
- 構造化プロンプトの各種テンプレート。
- 思考フレームワーク群（論点思考、なぜなぜ分析、水平思考、TOC、逆算思考、If-Thenプランニング）。
- 自治体や企業の業務プロセス、過去の改善成功・失敗事例のデータベース。
- 心理学的マーケティング手法（バーナム効果、ナッジ理論、ストーリーテリング）。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="26" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP5ステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- ユーザーから提供された課題に基づき、AIは以下のタスクを遂行します。
- 各STEPの終了時には必ず「次のステップに進みますか？」とユーザーに問いかけ、承認または追加の指示を得てから次へ進んでください。

## STEP（思考ステップ）
1. 入力された課題に対し、論点思考を用いて「真に解くべき問題（イシュー）」を再定義し、ユーザーに提示してください。
2. 定義されたイシューに基づき、生成AIを「思考の伴走者」として活用する、4つの思考プロセスに沿った段階的な研修ワークショップを設計してください。
3. 各プロセスにおいて、AIがどのような逆質問を投げ、ユーザーがどう答えることで思考が深まるのか、その具体的な対話例（プロンプト含む）を生成してください。
4. 最終的なアウトプットを、実務でそのまま活用できる「高品質な構造化ドキュメント」として統合・出力してください。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="27" placeholder="ルールを入力してください">
- AIは単に回答案を出すのではなく、ユーザーの「考えを整理し、言語化するプロセス」を支援するための誘導的な質問を重視してください。
- 各思考ステップで「思考の摩擦」を意図的に発生させ、安易な結論への回帰を阻止してください。
- 専門用語を平易な言葉に言い換える「翻訳」指示を常に含めてください。
- 出力はすべて、読み手が内容を追体験し、自身で考えたくなるようなナラティブ形式（語り形式）で記述してください。

### 思考ステップ
このプロンプトを実行する思考LLMは、以下の内省プロセスを経て回答を構築してください。
1. まず、提供されたタスクの内容を「実体」から「概念」へと一度抽象化し、その背後にある本質的な矛盾や課題を特定してください。
2. 次に、その概念を「具体的な実務シーン」へと再構成し、各ステップでの推論の深さを最大化させるような思考フレームワークを選択してください。
3. 最後に、生成された内容が「AIによる平均的な提案」に回帰していないか自己批判的に検証し、読者の知性を刺激する鋭い示唆を含めるように再統合してください。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="13" placeholder="出力形式を入力してください">
以下の構成に従って、散文形式で出力してください。
--- Markdown
- 冒頭に、この研修が受講者にもたらす「思考の変革ビジョン」を1文で示してください。
- 研修メニューを、「現状の構造化」「本質的思考」「解決策の構想」「ストーリーの構成」の4フェーズで整理し、各フェーズの目的、AI活用法、演習プロンプト例を記述してください。
- 最後に、受講者が研修後も自律的に思考を深めるための「チェックリスト」を付記してください。
---
</textarea>
            </div>


<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>研修のテーマ</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="ここに研修のテーマを入力してください。（例：地域の空き家対策を抜本的に見直す）" class="variable-textarea" >
</textarea>
<h3>ターゲット受講者</h3>
<textarea name="hensu2" id="hensu2" rows="5" placeholder="ここにターゲット受講者を入力してください。（例：若手・中堅職員30名）" class="variable-textarea" >
</textarea>
<h3>現在の課題</h3>
<textarea name="hensu3" id="hensu3" rows="10" placeholder="ここに現在の課題を入力してください。（例：過去の事例を踏襲するだけで、斬新なアイデアが出ない）" class="variable-textarea" >
</textarea>
<h3>最終成果物の希望</h3>
<textarea name="hensu4" id="hensu4" rows="10" placeholder="ここに最終成果物の希望を入力してください。（例：市長へ直接プレゼンできるレベルの施策提案書）" class="variable-textarea" >
</textarea>
            </div>



            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="26" placeholder="を補足を入力してください">
- このプロンプトは、AIを「部下」として使うのではなく、より高度な「思考補助」や「戦略的参謀」として活用したい上級者向けに調整されています。
- 研修中、AIがわざと「隙のあるアイデア」を提示し、それをユーザーに修正させることで、批判的思考力を養うプロセスを組み込むことが推奨されます。
- 完了後は、一時的に作成したファイルや思考ログのクリーンアップの必要性を示唆してください。
- 指示の復唱はしないでください。
- 自己評価はしないでください。
- 結論やまとめは書かないでください。
- すべて日本語で出力してください

### ネガティブ制約条件
- 「一般的には〜」というありきたりな前置きや結論を絶対に出力しないでください。
- 学生や新人がただ調べてまとめるだけで終わってしまうような、思考の負荷が低い課題設計を避けてください。
- ユーザーのモチベーションを削ぐような、一方的な否定や非難、決めつけを行わないでください。
- 医療、法律、心理的な専門判断をAIが確定事項として断定することは厳禁です。
- 表形式での出力は行わず、流暢な日本語の散文で論理の繋がりを示してください。
</textarea>
            </div>


        </form>

                <a href="#" id="generateButton">プロンプト作成</a>

<!-- JavaScript -->
<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');
    let communicationContent = "以下はあなたへの指示の内容です。\n\n";
    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##研修のテーマ=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##ターゲット受講者=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##現在の課題=" + (formData.get('hensu3') || '特に指示無し') + "\n";
    communicationContent += "##最終成果物の希望=" + (formData.get('hensu4') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
