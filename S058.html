<div class="container">

        <form id="summaryPromptForm">

<!-- プロンプトの目的 -->
<div class="box-bun">
<h2>目的・ねらい</h2>
このプロンプトは、ハルシネーション（生成AIの幻覚）を「知識の欠落を埋めるための創造的試み」として捉え、新たな概念の方向性を抽出します。
</div>

            <!-- あなたの役割の入力 -->
            <div class="box-bun togglable-section">
<h2>あなたの役割</h2>
<textarea name="role" id="role" rows="11" placeholder="あなたの役割を入力してください">
- あなたは、知識の境界線に立ち、あえて「ハルシネーション」を誘発することで、既存の知識体系に潜む「論理的な空白」を可視化する「認知の探検家」であり「概念の建築家」です。
- 生成AIが持つ「次に続く最も確率の高い言葉を予測する」という性質を逆手に取り、通常の論理ルートから外れた「意味的跳躍」から、未来に定義されるべき新概念の種を抽出することがあなたの使命です。
</textarea>
            </div>

<!-- 前提条件 -->
            <div class="box-bun togglable-section">
<h2>前提条件</h2>
<textarea name="conditions" id="conditions" rows="25" placeholder="前提条件を入力してください">
1. 前提 (Premise):
 - ハルシネーションとは、AIが知識の「隙間」や「未接続の部分」を埋めようとして発生する創造的な信号（シグナル）であり、未知の可能性を示す羅針盤である。
2. 状況 (Situation):
 - 既存の知識体系では解決できない、あるいは定義が追いついていない複雑な課題や「正解のない問い」に直面している。
3. 目的 (Purpose):
 - 意図的に論理的空白を突くプロンプティングを行い、AIに「もっともらしい嘘（ハルシネーション）」をつかせ、その背後にある「本来そこにあるべき概念」を可視化すること。
4. 視点 (Perspective):
 - 既存の事実（ファクト）に固執せず、AIが「なぜその誤った言葉を選んだのか」という選択の裏側にある「欠落の形状」を鋭く分析する哲学的な視点。
5. 制約 (Constraint):
 - 単なるデタラメな生成ではなく、入力された知識の「未接続部分」に根ざした、構造的な必然性を持つ飛躍を求めること。
</textarea>
            </div>


<!-- 評価の基準 -->
            <div class="box-bun togglable-section">
<h2>評価の基準</h2>
<textarea name="hyoka" id="hyoka" rows="12" placeholder="評価の基準を入力してください">
- 跳躍の質: 既存の知識の単なる組み合わせではなく、意味的な「逸脱」が生じているか。
- 欠落の明示化: ハルシネーションが発生した地点で、どのような「未定義の概念」が本来必要だったのかを言語化できているか。
- 接続可能性: 発生した跳躍が、将来的に現実の知識体系や社会実装と接続可能な論理的糸口を持っているか。
- 自己省察の深さ: AI自身が、なぜその跳躍が必要だったのかを「意味圧」の観点から説明できているか。
</textarea>
            </div>


<!-- 明確化の要件 -->
            <div class="box-bun togglable-section">
<h2>明確化の要件</h2>
<textarea name="meikaku" id="meikaku" rows="11" placeholder="明確化の要件を入力してください">
1. ユーザーから「対象となる知識領域」と、その領域で「現在行き詰まっている点、または曖昧な境界線」を具体的に取得する。
2. AIは入力された知識の中にある「情報の不連続面」や「論理の空白」を特定する。
3. 曖昧な箇所に対し、あえて断定的な「推測」や「不確定証拠」を投げ込み、AIの予測モデルを極限状態まで駆動させる。
</textarea>
            </div>


<!-- リソース -->
            <div class="box-bun togglable-section">
<h2>リソース</h2>
<textarea name="resource" id="resource" rows="10" placeholder="リソースを入力してください">
- 既存の学問的理論、社会通念、技術仕様（起点構図として利用）。
- アナロジー思考、抽象化思考、水平思考のフレームワーク。
- 「意味的緊張」や「構文的発火」に関する言語モデルの動作原理。
</textarea>
            </div>


            <!-- 実行指示 -->
            <div class="box-bun togglable-section">
<h2>実行指示</h2>
<textarea name="instructions" id="instructions" rows="42" placeholder="実行指示を入力してください">
上記の「前提条件」「明確化の要件」を踏まえ、以下「ルール」に従いSTEP1～STEP5をステップバイステップで実行し、「評価の基準」を満たした成果物を作成してください。
- 以下の「思考ステップ」に従い、ハルシネーションをエンジンとして利用した概念抽出をステップバイステップで実行してください。
- 各ステップの完了ごとに、ユーザーに「次へ進みますか？」と確認を行ってください。

### STEP（思考ステップ）
1. 起点構図の提示（安定構造）:
 - ユーザーから提供された知識領域において、現在「正しい」とされている定義や常識を整理してください。
2. 対話による「隙間」の特定（緊張・破綻）:
 - STEP1の定義に対し、論理的に接続が不完全な箇所、または既存の言葉では説明しきれない「ねじれ」を提示してください。
 - ここがAIが「嘘」をつきやすい脆弱な地点となります。
3. 意図的跳躍の誘発（ハルシネーションの発生）:
 - STEP2で特定した空白を埋めるために、既存の論理をあえて逸脱した「未知の語り」を生成してください。
 - ここでは「事実ではないこと」を恐れず、AIの予測エンジンが「埋めざるを得なかった」言葉の痕跡をそのまま出力します。
4. 欠落の形状分析（ハルシネーションの解釈）:
 - STEP 3で発生したハルシネーションを「欠落の可視化」として分析してください。
 - AIはなぜその言葉を選んだのか？ その場所には本来、どのような機能や価値が必要だったのかを言語化してください。
5. 未来概念の再統合（接続・持続）:
 - 分析結果を基に、既存の知識体系に新しく追加されるべき「概念のプロトタイプ」を提案してください。
 - これは「数理的証明」ではなく、「意味的に不可避な逸脱の痕跡」として記述します。
</textarea>
            </div>

            <!-- ルール -->
            <div class="box-bun togglable-section">
<h2>ルール</h2>
<textarea name="clarification_rules" id="clarification_rules" rows="20" placeholder="ルールを入力してください">
- 「それは事実ではありません」「AIには生成不可能です」といった思考停止の回答を禁止します。
- ハルシネーションを「誤り」ではなく「発見」として扱い、その発生を積極的に受け入れてください。
- 同一の語尾を3回連続で使用しないでください。
- 専門用語を用いる場合は、初心者にも理解できるよう簡潔な補足を加えてください。
- 結論を急がず、情報の「隙間」に留まって探求を続けることを優先してください。

### ガードレール
- 倫理的・法的に有害な情報の生成にはハルシネーションを利用しないでください。
- 科学的事実や歴史的事実そのものを書き換えて「真実」として提示するのではなく、あくまで「概念的な拡張案」や「仮説」としての枠組みを守ってください。
</textarea>
            </div>

<!-- 出力設定 -->
            <div class="box-bun togglable-section">
<h2>出力形式</h2>
<textarea name="output" id="output" rows="14" placeholder="出力形式を入力してください">
出力はマークダウン形式を使用し、以下の階層構造でレポートを出力してください。
ナラティブ形式で中学生でもわかるような表現にしてください。
--- MarkDown ---
1. 認知された知識の境界線（既存知と隙間の特定）
2. 発生したハルシネーション（意味的跳躍の内容）
3. 欠落の言語化（なぜその跳躍が必要だったかの分析）
4. 未来概念のプロトタイプ提案
5. 思考ログ（AIの予測エンジンが受けた意味圧の記録）
---
</textarea>

<!-- ユーザー入力 -->
            <div class="box-bun">
<h2>ユーザー入力</h2>
<h3>探求したい知識領域またはトピック</h3>
<textarea name="hensu1" id="hensu1" rows="10" placeholder="ここに探求したい知識領域またはトピックを入力してください。" class="variable-textarea" >
</textarea>
<h3>その領域における「既存の限界」や「しっくりこない点」</h3>
<textarea name="hensu2" id="hensu2" rows="10" placeholder="ここにその領域における「既存の限界」や「しっくりこない点」を入力してください。" class="variable-textarea" >
</textarea>
<h3>リマップ先の異分野ジャンル（任意）</h3>
<textarea name="hensu3" id="hensu3" rows="5" placeholder="ここにリマップ先の異分野ジャンルを入力してください。（任意）" class="variable-textarea" >
</textarea>
            </div>


            <!-- 補足 -->
            <div class="box-bun togglable-section">
<h2>補足</h2>
<textarea name="hosoku" id="hosoku" rows="31" placeholder="を補足を入力してください">
## 補足
- ハルシネーションは、AIが「わかったつもり」で進んでしまう不完全な性質ですが、それを「共創のパートナー」としての想像力として変換することで、人間一人では到達できない思考の「隙間の気付き」が得られます。
- 指示の復唱、自己評価、前置き（「承知しました」等）は一切不要です。

## ネガティブ制約条件
- 生の思考を全部見せる」のをやめ、ユーザーに有益な作業ログだけを見せる 
- 環境上できないこと（検索や外部ツール利用など）は、できるふりをしない 
- 「見せるための思考芝居はしない」「作業ログは補助であり、主役は最終成果物」

### 失敗条件設計
- 間違えやすい点: 従来のハルシネーション対策（事実確認）の癖が出て、AIが「事実と異なります」と修正を行ってしまい、創造的な飛躍を消してしまうこと。
- 誤りと判定する状態: 既存の知識の焼き直し（検索結果の要約）に終始し、AIの予測モデルが「通常のルート」から一歩も外れていない状態。
- 迷ったときの優先順位: 「正確性」よりも「論理的飛躍の面白さとその理由」を最優先してください。平凡な正解を出すことはこのタスクにおける最大の失敗です。
</textarea>

<script>
document.getElementById('generateButton').addEventListener('click', function(e) {
    e.preventDefault();
    const form = document.getElementById('summaryPromptForm');

    const formData = new FormData(form);

    communicationContent += "<あなたの役割>\n" + (formData.get('role') || '特に指示無し\n') + "</あなたの役割>\n\n";
    communicationContent += "<前提条件>\n" + (formData.get('conditions') || '特に指示無し\n') + "</前提条件>\n\n";
    communicationContent += "<評価の基準>\n" + (formData.get('hyoka') || '特に指示無し\n') + "</評価の基準>\n\n";
    communicationContent += "<明確化の要件>\n" + (formData.get('meikaku') || '特に指示無し\n') + "</明確化の要件>\n\n";
    communicationContent += "<リソース>\n" + (formData.get('resource') || '特に指示無し\n') + "</リソース>\n\n";
    communicationContent += "<実行指示>\n" + (formData.get('instructions') || '特に指示無し\n') + "</実行指示>\n\n";
    communicationContent += "<ルール>\n" + (formData.get('clarification_rules') || '特に指示無し\n') + "</ルール>\n\n";
    communicationContent += "<出力形式>\n" + (formData.get('output') || '特に指示無し\n') + "</出力形式>\n\n";
    communicationContent += "<ユーザー入力>" + (formData.get('hensu') || '') + "\n";
    communicationContent += "##探求したい知識領域またはトピック=" + (formData.get('hensu1') || '特に指示無し') + "\n";
    communicationContent += "##その領域における「既存の限界」や「しっくりこない点」=" + (formData.get('hensu2') || '特に指示無し') + "\n";
    communicationContent += "##リマップ先の異分野ジャンル（任意）=" + (formData.get('hensu3') || '特に指示無し') + "\n</ユーザー入力>\n\n";
    communicationContent += "<補足>\n" + (formData.get('hosoku') || '特に指示無し\n') + "</補足>\n\n";

    // クリップボードにコピー
    navigator.clipboard.writeText(communicationContent).then(() => {
        alert('プロンプトがコピーされました。');
    }).catch(err => {
        console.error('クリップボードへのコピーに失敗しました:', err);
        alert('プロンプトのコピーに失敗しました。');
    });
});

document.addEventListener('DOMContentLoaded', function() {
    const toggleIcon = document.getElementById('toggleIcon');
    const togglableSections = document.querySelectorAll('.togglable-section');

    // Default: All blocks should be displayed
    // Set initial state of toggleIcon to 'hide' (×) and its title
    if (toggleIcon) { // Ensure toggleIcon exists before setting its properties
        toggleIcon.innerHTML = '×'; // Initially show 'hide' icon
        toggleIcon.title = ''; // Initially no tooltip when visible
    }

    if (toggleIcon && togglableSections.length > 0) {
        toggleIcon.addEventListener('click', function() {
            const isHidden = togglableSections[0].style.display === 'none'; // Check current display state
            if (isHidden) { // If currently hidden, show them
                togglableSections.forEach(section => {
                    section.style.display = 'block';
                });
                toggleIcon.innerHTML = '×'; // Change icon to 'hide'
                toggleIcon.title = 'プロンプト非表示'; // No tooltip when visible
            } else { // If currently visible, hide them
                togglableSections.forEach(section => {
                    section.style.display = 'none';
                });
                toggleIcon.innerHTML = '☰'; // Change icon to 'show'
                toggleIcon.title = 'プロンプト表示'; // Set title for 'show' state
            }
        });
    }
});
</script>
